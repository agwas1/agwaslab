<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AgwasLab | 404 - Page Not Found</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #0d1117; color: #f0f6fc; min-height: 100vh; display: flex; align-items: center; justify-content: center; text-align: center; padding: 20px; }
    .container { max-width: 500px; }
    h1 { font-size: 8rem; font-weight: 700; color: #58a6ff; margin-bottom: 20px; }
    h2 { font-size: 2rem; margin-bottom: 16px; }
    p { color: #8b949e; margin-bottom: 32px; font-size: 1.1rem; }
    a { display: inline-block; padding: 14px 32px; background: #238636; color: #fff; text-decoration: none; border-radius: 8px; font-weight: 600; transition: all 0.3s; }
    a:hover { background: #2ea043; transform: translateY(-2px); }
  </style>
</head>
<body>
  <div class="container">
    <h1>404</h1>
    <h2>Page Not Found</h2>
    <p>The page you're looking for doesn't exist or has been moved.</p>
    <a href="/">Back to Home</a>
  </div>
  <script>
    sessionStorage.redirect = sessionStorage.redirect || '';
    if (sessionStorage.redirect && sessionStorage.redirect !== location.pathname) {
      history.replaceState(null, '', sessionStorage.redirect);
      sessionStorage.redirect = '';
    }
    sessionStorage.redirect = location.pathname;
  </script>
</body>
</html>
